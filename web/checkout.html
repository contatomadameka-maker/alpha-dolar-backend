<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a0f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.back{position:fixed;top:20px;left:20px;display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:13px;text-decoration:none;transition:all 0.2s}
.back:hover{background:rgba(255,255,255,0.1);color:#fff}
.card{background:#0d1117;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px;max-width:480px;width:100%;text-align:center}
.icon{font-size:64px;margin-bottom:16px}
.badge{display:inline-block;padding:4px 14px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.nome{font-family:'Syne',sans-serif;font-size:32px;font-weight:900;margin-bottom:10px}
.desc{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto}
.toggle-plano{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.btn-plano{padding:8px 24px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-plano.ativo{background:rgba(14,165,233,0.15);border-color:#0ea5e9;color:#0ea5e9}
.melhor{background:#22c55e;color:#000;font-size:8px;padding:2px 5px;border-radius:3px;margin-left:4px;font-weight:800}
.preco-wrap{margin-bottom:8px}
.preco{font-family:'Syne',sans-serif;font-size:48px;font-weight:900;line-height:1}
.preco-label{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px}
.feats{list-style:none;text-align:left;margin-bottom:28px;display:flex;flex-direction:column;gap:10px}
.feats li{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,0.7)}
.feats li::before{content:'✓';font-weight:700;font-size:12px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.btn-comprar{display:block;width:100%;padding:16px;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.5px;cursor:pointer;text-decoration:none;transition:all 0.2s;margin-bottom:12px}
.btn-comprar:hover{transform:translateY(-2px);filter:brightness(1.1)}
.garantia{font-size:12px;color:rgba(255,255,255,0.3)}
.not-found{text-align:center;padding:40px}
.not-found h2{font-size:24px;margin-bottom:10px}
</style>
</head>

<a href="javascript:history.back()" class="back">← Voltar</a>
<div class="card" id="checkout-card">

    <p style="color:rgba(255,255,255,0.4);margin-top:8px">Verifique o link e tente novamente.</p>

    produto: 'alpha-pattern'

  'alpha-clock': {
    icon: '⏰', nome: 'Alpha Clock', cor: '#f59e0b', corBg: 'rgba(245,158,11,0.15)',
    badge: 'HORÁRIOS', badgeCor: '#f59e0b',

    planos: [{ label: 'Mensal', preco: 'R$ 19,90', periodo: '/mês', link: 'https://pay.cakto.com.br/37ipd77_813220', melhor: false }],

    badge: 'COPY TRADE', badgeCor: '#ec4899',

  'premium-elite': {

let planoAtivo = 0;

function renderCheckout() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('produto');
  const p = PRODUTOS[id];
  if (!p) return;

  const card = document.getElementById('checkout-card');
  card.style.borderColor = p.cor.replace(')', ',0.3)').replace('rgb', 'rgba');

  card.innerHTML = `
    <div class="icon">${p.icon}</div>
    <div class="badge" style="background:${p.corBg};color:${p.badgeCor}">${p.badge}</div>
    <div class="nome" style="color:${p.cor}">${p.nome}</div>
    <div class="desc">${p.desc}</div>
    ${p.planos.length > 1 ? `
    <div class="toggle-plano">
      ${p.planos.map((pl,i) => `<button class="btn-plano ${i===0?'ativo':''}" onclick="trocarPlano(${i})">${pl.label}${pl.melhor?'<span class="melhor">MELHOR</span>':''}</button>`).join('')}
    </div>` : ''}
    <div class="preco-wrap">
      <div class="preco" id="preco-val" style="color:${p.cor}">${p.planos[0].preco}</div>
    </div>
    <div class="preco-label" id="preco-label">${p.planos[0].periodo}</div>
    <ul class="feats">
      ${p.feats.map(f => `<li style="--cor:${p.cor}"><span style="background:${p.corBg};color:${p.cor};min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px">✓</span>${f}</li>`).join('')}
    </ul>
    <a id="btn-comprar" href="${p.planos[0].link}" target="_blank" class="btn-comprar" style="background:linear-gradient(135deg,${p.cor},${p.cor});color:#fff">
      🛒 COMPRAR AGORA
    </a>
    <div class="garantia">🔒 Garantia de 7 dias • Pagamento seguro</div>
  `;

  window._produtoAtual = p;
}

function trocarPlano(i) {
  const p = window._produtoAtual;
  planoAtivo = i;
  document.getElementById('preco-val').textContent = p.planos[i].preco;
  document.getElementById('preco-label').textContent = p.planos[i].periodo;
  document.getElementById('btn-comprar').href = p.planos[i].link;
  document.querySelectorAll('.btn-plano').forEach((b,j) => b.classList.toggle('ativo', j===i));
}

renderCheckout();
</script>
</body>
</html>
